case: antiderivative

model:
  bayes_method: deterministic
  branch_type: fnn
  trunk_type: fnn
  branch_hidden: [32, 32]
  trunk_hidden: [32, 32]
  output_dim: 20
  num_sensors: 50

physics:
  pi_constraint: antiderivative
  pi_weight: 0.1
  bc_weight: 1.0
  ic_weight: 1.0

training:
  lr: 0.001
  epochs: 30
  batch_size: 64
  checkpoint_every: 10  # save every 10 epochs for resume

data:
  n_train: 200
  n_test: 50
  n_sensors: 50
  seed: 42
