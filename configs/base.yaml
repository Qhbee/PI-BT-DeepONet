# Base config for PI-BT-DeepONet (快速迭代：小规模)
model:
  bayes_method: deterministic  # deterministic | alpha_vi
  branch_type: fnn  # fnn | transformer
  trunk_type: fnn
  branch_hidden: [20, 20]
  trunk_hidden: [20, 20]
  output_dim: 20
  num_sensors: 50
  coord_dim: 1
  prior_sigma: 1.0
  min_noise: 0.001
  # Transformer Branch 专用
  transformer_d_model: 32
  transformer_nhead: 4
  transformer_num_layers: 2
  transformer_dropout: 0.1

training:
  lr: 0.001
  epochs: 20
  batch_size: 64
  alpha: 1.0
  mc_samples: 3
  eval_mc_samples: 20
  kl_weight: null
