# Base config for PI-BT-DeepONet (快速迭代：小规模)
case: antiderivative

model:
  bayes_method: deterministic  # deterministic | alpha_vi
  branch_type: fnn  # fnn | transformer
  trunk_type: fnn
  branch_hidden: [20, 20]
  trunk_hidden: [20, 20]
  output_dim: 20
  num_sensors: 50
  coord_dim: 1
  prior_sigma: 1.0
  min_noise: 0.001
  # Transformer Branch 专用
  transformer_d_model: 32
  transformer_nhead: 4
  transformer_num_layers: 2
  transformer_dropout: 0.1

physics:
  pi_constraint: none  # none | antiderivative
  pi_weight: 0.0       # PDE residual weight
  bc_weight: 0.0       # explicit boundary-condition loss weight (antiderivative: s(0)=0)
  ic_weight: 0.0       # explicit initial-condition loss weight (same anchor as BC for antiderivative)
  n_collocation: 256  # per-batch collocation points when pi_constraint != none
  burgers_nu: 0.015915494309189533  # 0.05 / pi
  diffusion_D: 0.01
  reaction_k: 0.1

training:
  lr: 0.001
  epochs: 20
  batch_size: 64
  alpha: 1.0
  mc_samples: 3
  eval_mc_samples: 20
  kl_weight: null

data:
  n_train: 300
  n_test: 100
  n_sensors: 50
  seed: 42
