case: ns_beltrami_parametric

model:
  model_type: deeponet_multi_output
  bayes_method: deterministic
  branch_type: transformer_multi_output
  trunk_type: fnn
  branch_hidden: [64, 64]
  trunk_hidden: [64, 64]
  output_dim: 24
  p_group: 24
  num_sensors: 64
  coord_dim: 4
  input_channels: 2
  prior_sigma: 1.0
  min_noise: 0.001
  transformer_d_model: 64
  transformer_nhead: 4
  transformer_num_layers: 2
  transformer_dropout: 0.1

physics:
  pi_constraint: ns_beltrami
  pi_weight: 0.1
  bc_weight: 1.0
  ic_weight: 1.0
  n_collocation: 256
  ns_nu: 0.025
  ns_beltrami_nu: 1.0
  pressure_gauge_weight: 0.01

training:
  lr: 0.001
  epochs: 80
  batch_size: 24
  alpha: 1.0
  mc_samples: 3
  eval_mc_samples: 20
  kl_weight: null

data:
  n_train: 120
  n_test: 30
  a_min: 0.5
  a_max: 1.5
  d_min: 0.5
  d_max: 1.5
  nt: 5
  nx: 10
  ny: 10
  nz: 10
  seed: 123
